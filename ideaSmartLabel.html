<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Smart Label - Innovación Registral CCMA</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--text:#f8fafc;
--muted:#94a3b8;
--primary:#38bdf8;
--success:#4ade80;
--danger:#f87171;
--border:#334155;
}

*{
box-sizing:border-box;
}

body{
margin:0;
padding:40px 20px;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
}

.container{
max-width:760px;
width:100%;
background:var(--card);
padding:32px;
border-radius:20px;
border:1px solid var(--border);
}

.header{
text-align:center;
margin-bottom:30px;
}

.badge{
display:inline-block;
padding:8px 16px;
border-radius:50px;
background:rgba(56,189,248,.1);
color:var(--primary);
margin-bottom:12px;
}

.subtitle{
color:var(--muted);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

input,
select,
textarea{
width:100%;
padding:12px;
background:#09111f;
border:1px solid var(--border);
color:white;
border-radius:10px;
}

.progress{
margin:30px 0;
}

.progress-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
color:var(--muted);
}

.bar{
height:10px;
background:#09111f;
border-radius:20px;
overflow:hidden;
}

.fill{
height:100%;
width:0;
background:linear-gradient(90deg,#38bdf8,#4ade80);
transition:.4s;
}

.checklist{
padding:20px;
background:#09111f;
border-radius:14px;
}

.item{
display:flex;
align-items:center;
gap:12px;
padding:14px;
margin-bottom:10px;
border-radius:10px;
background:#162234;
}

.item input{
width:auto;
flex:none;
margin:0;
}

.item label{
flex:1;
cursor:pointer;
}

.alert{
padding:16px;
border-radius:12px;
margin:20px 0;
}

.danger{
background:rgba(248,113,113,.15);
color:var(--danger);
}

.success{
background:rgba(74,222,128,.15);
color:var(--success);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:700;
background:linear-gradient(135deg,#38bdf8,#0284c7);
color:white;
margin-top:10px;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

.output{
display:none;
margin-top:24px;
}

.copy{
background:linear-gradient(135deg,#4ade80,#22c55e);
}

#btnComentario{
background:linear-gradient(
135deg,
#334155,
#1e293b
);
}

#comentarioBox{
display:none;
margin-top:10px;
}

#comentario{
height:120px;
}

#erp{
height:240px;
color:#4ade80;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="badge">
Low-Code MVP
</div>

<h2>
Smart Label 
</h2>

<div class="subtitle">
Control de Legalidad
</div>

</div>

<div class="grid">

<div>

<label>Tipo trámite</label>

<select id="tramite">

<option value="reforma">Reforma Estatutos</option>
<option value="constitucion_esal">Constitución ESAL</option>
<option value="fusion">Fusión</option>
<option value="constitucion_sas">Constitución SAS</option>
<option value="nombramiento_rl">Nombramiento Representante Legal</option>
<option value="junta_directiva">Junta Directiva</option>

</select>

</div>

<div>

<label>Radicado</label>

<input id="radicado">

</div>

</div>

<div class="progress">

<div class="progress-top">

<span>Progreso</span>

<span id="porcentaje">0%</span>

</div>

<div class="bar">

<div class="fill" id="fill"></div>

</div>

</div>

<div class="checklist" id="checklist"></div>

<div id="estado" class="alert danger">

⚠ Faltan requisitos

</div>

<button id="btnComentario">
＋ Agregar comentario jurídico
</button>

<div id="comentarioBox">

<textarea
id="comentario"
placeholder="Comentario opcional...">
</textarea>

<button id="guardarComentario">
Guardar comentario
</button>

</div>

<button id="procesar" disabled>
Generar mi Label
</button>

<div class="output" id="salida">

<textarea id="erp" readonly></textarea>

<button class="copy">
Copiar
</button>

</div>

</div>

<script>

const matriz={

reforma:[
"Verificación de quórum",
"Validación firmas",
"Derecho preferencia",
"Cotejo estatutos"
],

constitucion_esal:[
"Control homonimia",
"Validación patrimonio",
"Cláusula liquidación"
],

fusion:[
"Avisos de fusión",
"Estados financieros",
"Derecho retiro"
],

constitucion_sas:[
"Homonimia",
"Objeto social",
"Capital",
"Representante legal",
"Firmas"
],

nombramiento_rl:[
"Órgano competente",
"Convocatoria",
"Quórum",
"Aceptación"
],

junta_directiva:[
"Convocatoria",
"Miembros",
"Periodo",
"Firmas"
]

};

const tramite=document.getElementById("tramite");
const checklist=document.getElementById("checklist");
const porcentaje=document.getElementById("porcentaje");
const fill=document.getElementById("fill");
const estado=document.getElementById("estado");
const procesar=document.getElementById("procesar");
const salida=document.getElementById("salida");
const comentario=document.getElementById("comentario");
const comentarioBox=document.getElementById("comentarioBox");
const btnComentario=document.getElementById("btnComentario");
const guardarComentario=document.getElementById("guardarComentario");
const erp=document.getElementById("erp");

function cargar(){

checklist.innerHTML="";

matriz[tramite.value]
.forEach((txt,i)=>{

checklist.innerHTML+=`
<div class="item">

<input
type="checkbox"
id="c${i}"
onchange="actualizar()">

<label for="c${i}">
${txt}
</label>

</div>
`;

});

salida.style.display="none";
erp.value="";

actualizar();

}

function actualizar(){

let ok=0;

matriz[tramite.value]
.forEach((_,i)=>{

if(document.getElementById(`c${i}`)?.checked)
ok++;

});

const pct=
Math.round(
(ok/matriz[tramite.value].length)*100
);

fill.style.width=
pct+"%";

porcentaje.textContent=
pct+"%";

if(pct===100){

estado.className=
"alert success";

estado.innerHTML=
"✓ Control completo";

procesar.disabled=false;

}else{

estado.className=
"alert danger";

estado.innerHTML=
"⚠ Faltan requisitos";

procesar.disabled=true;

}

}

function generar(){

let texto=
`CCMA - CONTROL LEGALIDAD

TRÁMITE:
${tramite.options[tramite.selectedIndex].text}

RADICADO:
${radicado.value||"PENDIENTE"}

FECHA:
${new Date().toLocaleString()}
`;

document
.querySelectorAll(
'.checklist input'
)
.forEach((c,i)=>{

if(c.checked){

texto+=`\n[✓] ${matriz[tramite.value][i]}`;

}

});

if(comentario.value.trim()){

texto+=`\n\nCOMENTARIO:\n${comentario.value}`;

}

erp.value=texto;

salida.style.display="block";

/* reiniciar para nueva ejecución */

comentario.value="";

comentarioBox.style.display="none";

}

btnComentario.onclick=()=>{

comentarioBox.style.display=
comentarioBox.style.display==="block"
?
"none"
:
"block";

};

guardarComentario.onclick=()=>{

comentarioBox.style.display="none";

alert("Comentario guardado");

};

async function copiar(){

await navigator.clipboard.writeText(
erp.value
);

alert("Copiado");

}

tramite.onchange=cargar;

procesar.onclick=generar;

document
.querySelector(".copy")
.onclick=copiar;

cargar();

</script>

</body>
</html>
